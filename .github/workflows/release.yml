name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pack-and-publish:
    name: Pack and publish
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Surefire.Dashboard/ui/package-lock.json

      - name: Restore solution
        run: dotnet restore surefire.slnx

      - name: Build solution
        run: dotnet build surefire.slnx --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Run tests
        run: dotnet test surefire.slnx --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack surefire.slnx --configuration Release --no-build --output ./artifacts -p:ContinuousIntegrationBuild=true

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-release
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          if-no-files-found: error
          retention-days: 90

      - name: Push packages to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is not set."
            exit 1
          fi
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
